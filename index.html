<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アドリオ/Adrio</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
</head>
<body>
    <div id="adrio-app">
        <header id="top-bar">
            <div class="header-left">
                <button id="toggle-left" class="icon-btn" title="インデックス切替"><i data-lucide="menu"></i></button>
                <div class="logo">
                    <span class="logo-icon"></span>
                    アドリオ/Adrio
                </div>
            </div>
            
            <div class="header-right">
                <button id="toggle-search-btn" class="icon-btn" title="検索"><i data-lucide="search"></i></button>

                <span class="toolbar-separator"></span>

                <span id="project-name-display"></span>
                <span id="current-file-name">未選択</span>
                <div class="mode-switcher">
                    <button id="mode-rich" class="mode-btn">RICH</button>
                    <button id="mode-md" class="mode-btn">MD</button>
                </div>
                <button id="toggle-preview-btn" class="icon-btn" style="display:none;" title="表示モード切替"><i data-lucide="layout-template"></i></button>
                
                <div style="position: relative; display: flex; align-items: center;">
                    <button id="font-toggle" class="icon-btn" title="フォント切替"><i data-lucide="type"></i></button>
                    <div id="font-dropdown" class="settings-dropdown" style="display:none; max-height: 400px; overflow-y: auto; width: 220px; right: 0;">
                        <div style="padding: 4px 8px; font-size: 11px; color: var(--text-faint); font-weight: bold;">デフォルト</div>
                        <button class="font-select-btn" data-font="gothic" style="font-family: var(--font-gothic);">角ゴシック</button>
                        <button class="font-select-btn" data-font="mincho" style="font-family: var(--font-mincho);">明朝</button>
                        
                        <div style="padding: 4px 8px; font-size: 11px; color: var(--text-faint); font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); margin-top: 4px; padding-top: 8px;">
                            PCのフォント
                            <button id="load-system-fonts-btn" class="icon-btn" style="padding: 2px;" title="PCのフォントを読み込む"><i data-lucide="download" style="width: 14px; height: 14px;"></i></button>
                        </div>
                        <div id="system-fonts-list" style="display: flex; flex-direction: column; gap: 2px; margin-top: 4px;">
                            <div style="padding: 8px; font-size: 11px; color: var(--text-muted); text-align: center;">ボタンを押して読み込み</div>
                        </div>
                    </div>
                </div>

                <button id="theme-toggle" class="icon-btn" title="テーマ切替"><i data-lucide="sun"></i></button>
                
                <div style="position: relative; display: flex; align-items: center;">
                    <button id="settings-toggle-btn" class="icon-btn" title="設定"><i data-lucide="settings"></i></button>
                    <div id="settings-dropdown" class="settings-dropdown" style="display:none;">
                        <input type="file" id="font-upload" accept=".ttf,.otf,.woff,.woff2" style="display:none;">
                        <button onclick="document.getElementById('font-upload').click()" class="sub-btn" style="width:100%; justify-content:center; display:flex; align-items:center;">
                            <i data-lucide="spell-check" style="width:14px;height:14px;margin-right:6px;"></i>カスタムフォント読込
                        </button>
                    </div>
                </div>

                <button id="resume-btn" class="secondary-btn" style="display:none;"><i data-lucide="folder-clock" style="width:14px;height:14px;margin-right:4px;vertical-align:text-bottom;"></i>再開</button>
                <button id="open-folder-btn" class="primary-btn">フォルダを開く</button>
                
                <button id="pdf-export-modal-btn" class="icon-btn" title="PDF出力"><i data-lucide="printer"></i></button>
                
                <button id="toggle-right" class="icon-btn" title="パネル切替"><i data-lucide="panel-right"></i></button>
            </div>
        </header>

        <div id="workspace">
            <nav id="left-sidebar" class="column side-column">
                <div class="column-header">INDEX</div>
                <div id="file-tree" class="content-area scrollable"></div>
            </nav>

            <div class="resizer" id="resizer-left"></div>

            <main id="main-editor" class="column">
                <div id="editor-container" style="position: relative;">
                    
                    <div id="search-bar-container" class="floating-search" style="display: none;">
                        <i data-lucide="search" style="width:14px; height:14px; color:var(--text-faint); margin-left:4px;"></i>
                        <input type="text" id="search-input" placeholder="ファイル内検索...">
                        <button id="search-prev" class="icon-btn" title="前へ"><i data-lucide="chevron-up"></i></button>
                        <button id="search-next" class="icon-btn" title="次へ"><i data-lucide="chevron-down"></i></button>
                        <div class="toolbar-separator"></div>
                        <button id="search-close" class="icon-btn" title="閉じる"><i data-lucide="x"></i></button>
                    </div>

                    <input type="file" id="image-upload" accept="image/*" style="display:none;" multiple>

                    <div id="floating-toolbar" class="formatting-toolbar floating">
                        <button onclick="execCmd('bold')" title="太字"><i data-lucide="bold"></i></button>
                        <button onclick="execCmd('italic')" title="斜体"><i data-lucide="italic"></i></button>
                        <div class="toolbar-separator"></div>
                        <button onclick="execCmd('formatBlock', 'h2')" title="見出し2"><i data-lucide="heading-2"></i></button>
                        <button onclick="execCmd('formatBlock', 'h3')" title="見出し3"><i data-lucide="heading-3"></i></button>
                        <button onclick="execCmd('insertUnorderedList')" title="箇条書き"><i data-lucide="list"></i></button>
                        <div class="toolbar-separator"></div>
                        <button onclick="document.getElementById('image-upload').click()" title="画像アップロード"><i data-lucide="image-plus"></i></button>

                        <span class="secondary-tools" style="display:flex; align-items:center; gap:4px;">
                            <span class="toolbar-separator"></span>
                            <button onclick="execCmd('strikeThrough')" title="取り消し線"><i data-lucide="strikethrough"></i></button>
                            <button onclick="execCmd('formatBlock', 'h1')" title="見出し1"><i data-lucide="heading-1"></i></button>
                            <button onclick="execCmd('formatBlock', 'blockquote')" title="引用"><i data-lucide="quote"></i></button>
                            <button onclick="execCmd('insertOrderedList')" title="番号付きリスト"><i data-lucide="list-ordered"></i></button>
                            <button onclick="execCmd('outdent')" title="インデント解除（左へ）"><i data-lucide="outdent"></i></button>
                            <button onclick="execCmd('indent')" title="インデント（ネスト/右へ）"><i data-lucide="indent"></i></button>
                            <button onclick="execCmd('insertHorizontalRule')" title="区切り線"><i data-lucide="minus"></i></button>
                            <button onclick="insertInternalLink()" title="内部リンク"><i data-lucide="link"></i></button>
                            <button onclick="insertMathBlock()" title="数式ブロック"><i data-lucide="sigma"></i></button>
                        </span>

                        <button id="toolbar-more-btn" title="もっと見る" style="display:none;"><i data-lucide="more-horizontal"></i></button>
                        
                        <div id="toolbar-dropdown" class="toolbar-dropdown" style="display:none;"></div>
                    </div>

                    <div id="editor-rich" class="content-area scrollable" contenteditable="true" spellcheck="false"></div>
                    
                    <div id="editor-md-split" style="display: none;">
                        <div class="md-editor-wrapper" id="md-input-area">
                            <div id="line-numbers"></div>
                            <textarea id="md-input" spellcheck="false"></textarea>
                        </div>
                        <div class="resizer-v" id="resizer-md"></div>
                        <div id="md-preview" class="content-area scrollable"></div>
                    </div>
                </div>
            </main>

            <div class="resizer" id="resizer-right"></div>

            <aside id="right-panel" class="column side-column">
                <div class="tab-container">
                    <div class="tab-slider" id="main-tab-slider">
                        <div id="tab-indicator"></div>
                        <button class="tab-btn active" data-tab="chara">CHARA</button>
                        <button class="tab-btn" data-tab="memo">MEMO</button>
                        <button class="tab-btn" data-tab="image">IMAGE</button>
                    </div>
                </div>

                <div id="panel-list-view" class="scroll-container">
                    <div class="new-card-btn-container" style="padding: 12px 12px 0;">
                        <button id="show-editor-btn" class="primary-btn" title="新規作成" style="width: 100%; justify-content: center; padding: 10px;">
                            <i data-lucide="plus" style="width:16px; height:16px; margin-right:4px;"></i>新規カードを作成
                        </button>
                    </div>
                    <div id="panel-content" class="content-area scrollable"></div>
                </div>
            </aside>
        </div>
    </div>

    <div id="pdf-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>PDF出力</h3>
                <button id="close-pdf-modal" class="icon-btn"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <div class="pdf-options">
                    <label><input type="radio" name="pdf-mode" value="single" checked> 現在のファイルのみ</label>
                    <label><input type="radio" name="pdf-mode" value="all"> 全ファイルを結合</label>
                </div>
                <div id="pdf-sortable-container" style="display:none;">
                    <p style="font-size: 11px; color: var(--text-muted); margin-bottom: 8px;">ドラッグ＆ドロップで出力順を変更できます。チェックを外したファイルは除外されます。</p>
                    <ul id="pdf-file-list" class="sortable-list"></ul>
                </div>
            </div>
            <div class="modal-footer">
                <button id="exec-pdf-export" class="primary-btn">PDFを生成</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
